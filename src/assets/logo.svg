<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Light green upward arrow (background layer) -->
  <g opacity="0.6">
    <polyline
      points="20,72 45,42 62,58 82,28"
      stroke="#86EFAC"
      stroke-width="7"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- Arrowhead -->
    <polygon
      points="82,28 68,30 78,42"
      fill="#86EFAC"
      stroke="#86EFAC"
      stroke-width="2"
      stroke-linejoin="round"
    />
  </g>

  <!-- Dark green M shape (foreground layer) -->
  <polyline
    points="15,75 15,30 42,62 68,30 68,75"
    stroke="#1F7A63"
    stroke-width="7.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
